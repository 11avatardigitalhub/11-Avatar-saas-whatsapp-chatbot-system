<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Misayan SaaS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/branding.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #00a149 0%, #319131 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #00a149 0%, #319131 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
        }

        .form-control {
            width: 100%;
            padding: 12px 45px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #00a149;
            box-shadow: 0 0 0 3px rgba(0, 161, 73, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00a149 0%, #319131 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 161, 73, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            font-size: 13px;
            color: #666;
        }

        .footer a {
            color: #00a149;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .password-requirements h4 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .password-requirements ul {
            list-style: none;
            padding: 0;
        }

        .password-requirements li {
            padding: 5px 0;
            color: #666;
        }

        .password-requirements li i {
            margin-right: 8px;
            width: 16px;
        }

        .password-requirements li.valid {
            color: #4caf50;
        }

        .password-requirements li.invalid {
            color: #999;
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }

            .body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-lock"></i>
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>

        <div class="body">
            <div id="alert" class="alert"></div>

            <div id="formContainer">
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('newPassword')"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                        </div>
                    </div>

                    <div class="password-requirements">
                        <h4><i class="fas fa-shield-alt"></i> Password Requirements:</h4>
                        <ul>
                            <li id="req-length" class="invalid">
                                <i class="fas fa-circle"></i> At least 8 characters
                            </li>
                            <li id="req-match" class="invalid">
                                <i class="fas fa-circle"></i> Passwords match
                            </li>
                        </ul>
                    </div>

                    <button type="submit" id="submitBtn" class="btn">
                        <i class="fas fa-check"></i> Reset Password
                    </button>
                </form>
            </div>

            <div id="successContainer" style="display: none; text-align: center;">
                <div style="font-size: 64px; color: #4caf50; margin-bottom: 20px;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2 style="color: #333; margin-bottom: 10px;">Password Reset Successful!</h2>
                <p style="color: #666; margin-bottom: 30px;">
                    Your password has been reset successfully. You can now login with your new password.
                </p>
                <a href="/login" class="btn">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
            </div>
        </div>

        <div class="footer">
            <a href="/login">Back to login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertDiv = document.getElementById('alert');
        const formContainer = document.getElementById('formContainer');
        const successContainer = document.getElementById('successContainer');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showAlert('Invalid or missing reset token. Please request a new password reset link.', 'error');
            submitBtn.disabled = true;
        }

        // Password validation
        function validatePassword() {
            const password = newPasswordInput.value;
            const confirm = confirmPasswordInput.value;

            // Length check
            const lengthValid = password.length >= 8;
            document.getElementById('req-length').className = lengthValid ? 'valid' : 'invalid';
            document.getElementById('req-length').querySelector('i').className = lengthValid ? 'fas fa-check-circle' : 'fas fa-circle';

            // Match check
            const matchValid = password === confirm && password.length > 0;
            document.getElementById('req-match').className = matchValid ? 'valid' : 'invalid';
            document.getElementById('req-match').querySelector('i').className = matchValid ? 'fas fa-check-circle' : 'fas fa-circle';

            return lengthValid && matchValid;
        }

        newPasswordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePassword);

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash toggle-password';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye toggle-password';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validate
            if (!validatePassword()) {
                showAlert('Please meet all password requirements', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: token,
                        newPassword: newPassword 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Show success container
                    formContainer.style.display = 'none';
                    successContainer.style.display = 'block';
                } else {
                    showAlert(data.message || 'Failed to reset password', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showAlert('Connection error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
            }
        });

        function showAlert(message, type) {
            alertDiv.className = `alert alert-${type} show`;
            alertDiv.textContent = message;
        }
    </script>
</body>
</html>
