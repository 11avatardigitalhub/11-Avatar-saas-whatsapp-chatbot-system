<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Misayan SaaS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/branding.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #00a149 0%, #319131 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header i {
            font-size: 48px;
            color: #00a149;
            margin-bottom: 15px;
        }

        .register-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #666;
            font-size: 14px;
        }

        .plan-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #00a149;
        }

        .plan-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .plan-info .price {
            font-size: 32px;
            font-weight: bold;
            color: #00a149;
            margin-bottom: 10px;
        }

        .plan-info .price span {
            font-size: 16px;
            color: #666;
            font-weight: normal;
        }

        .plan-info ul {
            list-style: none;
            margin-top: 15px;
        }

        .plan-info ul li {
            padding: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .plan-info ul li i {
            color: #25D366;
            margin-right: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #00a149;
            box-shadow: 0 0 0 3px rgba(0, 161, 73, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-help {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00a149 0%, #319131 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 161, 73, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #00a149;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #00a149;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .alert-info {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .register-container {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <i class="fab fa-whatsapp"></i>
            <h1>Create Your Account</h1>
            <p>Start your journey with Misayan SaaS</p>
        </div>

        <div id="planInfo" class="plan-info" style="display: none;">
            <!-- Plan info will be loaded here -->
        </div>

        <div id="alertContainer"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Company Name <span class="required">*</span></label>
                <input type="text" id="companyName" class="form-control" placeholder="Your Company Name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Your Name <span class="required">*</span></label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" class="form-control">
                </div>

                <div class="form-group">
                    <label>Username <span class="required">*</span></label>
                    <input type="text" id="username" class="form-control" placeholder="admin" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password <span class="required">*</span></label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                <i class="fas fa-rocket"></i> Create Account
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Creating your account...</p>
        </div>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        // Translation keys
        const translations = {
            en: {
                password_error: 'Password must be at least 6 characters long',
                success_message: 'Account created successfully! Redirecting to login...',
                error_message: 'Error creating account. Please try again.'
            }
        };

        const currentLang = 'en'; // Will be replaced by i18n system

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function showAlert(message, type = 'error') {
            const alertContainer = document.getElementById('alertContainer');
            let icon = 'exclamation-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'info') icon = 'info-circle';
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${icon}"></i>
                    ${message}
                </div>
            `;
        }

        // Get plan ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const planId = urlParams.get('plan');
        let selectedPlan = null;

        // Verificar se há um plano selecionado
        if (!planId) {
            // Aguardar o DOM estar pronto
            document.addEventListener('DOMContentLoaded', function() {
                // Se não há plano, mostrar mensagem e redirecionar
                showAlert('⚠️ Você precisa selecionar um plano antes de se registrar. Redirecionando para a página de planos...', 'info');
                
                // Esconder o formulário
                const form = document.getElementById('registerForm');
                if (form) form.style.display = 'none';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
            });
        } else {
            // Load plan info if plan ID is provided
            document.addEventListener('DOMContentLoaded', function() {
                loadPlanInfo(planId);
            });
        }

        async function loadPlanInfo(planId) {
            try {
                const response = await fetch('/api/landing/settings');
                const data = await response.json();

                if (data.success) {
                    const plan = data.data.plans.find(p => p.id == planId);
                    if (plan) {
                        selectedPlan = plan;
                        displayPlanInfo(plan);
                    }
                }
            } catch (error) {
                console.error('Error loading plan:', error);
            }
        }

        function displayPlanInfo(plan) {
            const planInfo = document.getElementById('planInfo');
            const features = plan.formatted_features || [];
            
            planInfo.innerHTML = `
                <h3>${plan.name}</h3>
                <div class="price">${plan.currency} ${parseFloat(plan.price).toFixed(2)} <span>/month</span></div>
                <ul>
                    ${features.map(f => `<li><i class="fas fa-check"></i> ${f.text}</li>`).join('')}
                </ul>
            `;
            planInfo.style.display = 'block';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Verificar se há um plano selecionado
            if (!planId) {
                showAlert('Erro: Nenhum plano selecionado. Redirecionando para seleção de planos...');
                setTimeout(() => {
                    window.location.href = '/#plans';
                }, 2000);
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const form = document.getElementById('registerForm');

            // Get form data
            const formData = {
                name: document.getElementById('companyName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                company_name: document.getElementById('companyName').value.trim(),
                plan_id: planId || 1,
                admin_username: document.getElementById('username').value.trim(),
                admin_password: document.getElementById('password').value,
                admin_email: document.getElementById('email').value.trim(),
                admin_name: document.getElementById('name').value.trim()
            };

            // Validation
            if (formData.admin_password.length < 6) {
                showAlert(t('password_error'));
                return;
            }

            // Show loading
            form.style.display = 'none';
            loading.classList.add('active');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/public/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    // Check if plan is free
                    if (selectedPlan && selectedPlan.price > 0) {
                        // Redirect to checkout for paid plans
                        showAlert('Account created! Redirecting to payment...', 'success');
                        setTimeout(() => {
                            window.location.href = `/checkout?plan=${planId}&tenant=${data.data.tenant_id}`;
                        }, 1500);
                    } else {
                        // Free plan - redirect to login
                        showAlert(t('success_message'), 'success');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    }
                } else {
                    form.style.display = 'block';
                    loading.classList.remove('active');
                    submitBtn.disabled = false;
                    showAlert(data.message || t('error_message'));
                }
            } catch (error) {
                console.error('Error:', error);
                form.style.display = 'block';
                loading.classList.remove('active');
                submitBtn.disabled = false;
                showAlert(t('error_message'));
            }
        });
    </script>
</body>
</html>
